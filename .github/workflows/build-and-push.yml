name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Debug OIDC Token
        run: |
          echo "GitHub Repository: $GITHUB_REPOSITORY"
          echo "GitHub Ref: $GITHUB_REF"
          echo "GitHub Actor: $GITHUB_ACTOR"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: photo-uploader
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Inject stack outputs into taskdef
        run: |
          DB_HOST=$(aws cloudformation list-exports \
            --query "Exports[?Name=='photo-uploader-DBInstanceEndpoint'].Value" \
            --output text --region eu-central-1)
          S3_BUCKET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='photo-uploader-PhotoBucketName'].Value" \
            --output text --region eu-central-1)
          CF_DOMAIN=$(aws cloudformation list-exports \
            --query "Exports[?Name=='photo-uploader-CloudFrontDomainName'].Value" \
            --output text --region eu-central-1)

          if [ -z "$DB_HOST" ] || [ -z "$S3_BUCKET" ] || [ -z "$CF_DOMAIN" ]; then
            echo "ERROR: one or more stack exports were empty."
            echo "DB_HOST=$DB_HOST  S3_BUCKET=$S3_BUCKET  CF_DOMAIN=$CF_DOMAIN"
            exit 1
          fi

          echo "DB_HOST=$DB_HOST"
          echo "S3_BUCKET=$S3_BUCKET"
          echo "CF_DOMAIN=$CF_DOMAIN"

          sed -i "s|<DB_HOST>|$DB_HOST|g" taskdef.json
          sed -i "s|<S3_BUCKET_NAME>|$S3_BUCKET|g" taskdef.json
          sed -i "s|<CLOUDFRONT_DOMAIN>|$CF_DOMAIN|g" taskdef.json

          echo "----- Final taskdef.json -----"
          cat taskdef.json

      - name: Upload taskdef and appspec to S3
        env:
          ARTIFACT_BUCKET: photo-uploader-artifacts-904233109505
        run: |
          zip source.zip taskdef.json appspec.yml
          unzip -l source.zip
          aws s3 cp source.zip s3://$ARTIFACT_BUCKET/templates/source.zip