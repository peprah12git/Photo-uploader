<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Uploader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --accent-hover: #4f46e5;
    --text: #1e293b;
    --muted: #94a3b8;
    --success: #22c55e;
    --error: #ef4444;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    text-decoration: none;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid;
    place-items: center;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  .nav-count {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── LAYOUT ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── UPLOAD ZONE ── */
  .upload-section { margin-bottom: 48px; }
  .section-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
  }

  .drop-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    width: 56px; height: 56px;
    background: var(--accent-light);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .drop-icon svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .drop-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--muted); }
  .drop-sub span {
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
  }

  /* ── PREVIEW STRIP ── */
  #previewStrip {
    display: none;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  #previewStrip.visible { display: block; }
  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .preview-header span { font-size: 14px; font-weight: 600; }
  .clear-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .15s;
  }
  .clear-btn:hover { background: var(--bg); color: var(--text); }

  .preview-thumb {
    width: 88px; height: 88px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid var(--border);
  }

  /* ── FORM ROW ── */
  .form-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .form-row input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .form-row input[type="text"]:focus { border-color: var(--accent); background: var(--surface); }
  .form-row input::placeholder { color: var(--muted); }

  .upload-btn {
    padding: 11px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .15s, transform .1s;
    white-space: nowrap;
  }
  .upload-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .upload-btn:active:not(:disabled) { transform: scale(.97); }
  .upload-btn:disabled { opacity: .55; cursor: not-allowed; }
  .upload-btn svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2.2; }

  /* ── STATUS ── */
  #status {
    margin-top: 14px;
    font-size: 13px;
    min-height: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .s-success .status-dot { background: var(--success); }
  .s-error   .status-dot { background: var(--error); }
  .s-loading .status-dot { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .s-success { color: var(--success); }
  .s-error   { color: var(--error); }
  .s-loading { color: var(--muted); }

  /* ── GALLERY ── */
  .gallery-section {}
  .gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .gallery-header h2 { font-size: 20px; font-weight: 700; }
  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background .15s;
  }
  .refresh-btn:hover { background: var(--bg); }
  .refresh-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform .2s, box-shadow .2s;
  }
  .photo-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }
  .photo-card .thumb-wrap {
    position: relative;
    overflow: hidden;
    height: 200px;
    background: var(--bg);
  }
  .photo-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .35s ease;
  }
  .photo-card:hover img { transform: scale(1.04); }

  .photo-card .info {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
  }
  .photo-card .info .name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .photo-card .info .date {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, #f0f2f5 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-card { height: 260px; }

  /* ── EMPTY ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state svg {
    width: 52px; height: 52px;
    stroke: var(--border);
    fill: none;
    stroke-width: 1.5;
    margin-bottom: 16px;
  }
  .empty-state p { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .empty-state span { font-size: 13px; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    PhotoDrop
  </a>
  <span class="nav-count" id="navCount"></span>
</nav>

<main>

  <!-- UPLOAD -->
  <section class="upload-section">
    <div class="section-title">Upload a photo</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
      </div>
      <div class="drop-title">Drop your image here</div>
      <div class="drop-sub">or <span>browse files</span> &nbsp;·&nbsp; PNG, JPG, WEBP up to 10 MB</div>
    </div>

    <div id="previewStrip">
      <div class="preview-header">
        <span>Selected file</span>
        <button class="clear-btn" id="clearBtn">Remove</button>
      </div>
      <img id="previewImg" class="preview-thumb" src="" alt="preview">
      <div class="form-row">
        <input type="text" id="descInput" placeholder="Add a description (optional)">
        <button class="upload-btn" id="uploadBtn">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload
        </button>
      </div>
      <div id="status"></div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery-section">
    <div class="gallery-header">
      <h2>Gallery</h2>
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>
    <div id="grid" class="grid"></div>
  </section>

</main>

<script>
  const API = '/api/photos';

  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const previewStrip = document.getElementById('previewStrip');
  const previewImg = document.getElementById('previewImg');
  const descInput  = document.getElementById('descInput');
  const uploadBtn  = document.getElementById('uploadBtn');
  const clearBtn   = document.getElementById('clearBtn');
  const statusEl   = document.getElementById('status');
  const grid       = document.getElementById('grid');
  const navCount   = document.getElementById('navCount');
  const refreshBtn = document.getElementById('refreshBtn');

  // ── drag & drop highlighting ──
  ['dragenter','dragover'].forEach(e =>
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag-over'); }));
  ['dragleave','drop'].forEach(e =>
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('drag-over'); }));
  dropZone.addEventListener('drop', ev => {
    const f = ev.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) selectFile(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) selectFile(fileInput.files[0]);
  });

  function selectFile(file) {
    const reader = new FileReader();
    reader.onload = e => { previewImg.src = e.target.result; };
    reader.readAsDataURL(file);
    previewStrip.classList.add('visible');
    setStatus('', '');
  }

  clearBtn.addEventListener('click', resetForm);
  function resetForm() {
    fileInput.value = '';
    previewImg.src = '';
    descInput.value = '';
    previewStrip.classList.remove('visible');
    setStatus('', '');
  }

  function setStatus(msg, type) {
    if (!msg) { statusEl.innerHTML = ''; statusEl.className = ''; return; }
    statusEl.className = 's-' + type;
    statusEl.innerHTML = '<div class="status-dot"></div>' + escapeHtml(msg);
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  // ── upload ──
  uploadBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) { setStatus('Please select a file first.', 'error'); return; }

    const fd = new FormData();
    fd.append('file', file);
    fd.append('description', descInput.value || '');

    uploadBtn.disabled = true;
    setStatus('Uploading…', 'loading');

    try {
      const res = await fetch(API, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      setStatus('Upload successful!', 'success');
      resetForm();
      await loadPhotos();
    } catch (err) {
      setStatus(err.message, 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  });

  // ── gallery ──
  async function loadPhotos() {
    renderSkeletons();
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error('Failed to load (' + res.status + ')');
      const photos = await res.json();
      renderPhotos(photos);
    } catch (err) {
      grid.innerHTML = '<div class="empty-state"><p>Could not load photos</p><span>' + escapeHtml(err.message) + '</span></div>';
    }
  }

  function renderSkeletons() {
    grid.innerHTML = Array.from({length: 6}, () =>
      '<div class="skeleton skeleton-card"></div>').join('');
  }

  function renderPhotos(photos) {
    grid.innerHTML = '';
    navCount.textContent = photos && photos.length ? photos.length + ' photo' + (photos.length !== 1 ? 's' : '') : '';

    if (!photos || photos.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>No photos yet</p>
          <span>Upload your first photo above.</span>
        </div>`;
      return;
    }

    const sorted = [...photos].sort((a, b) =>
      (b.uploadedAt ? new Date(b.uploadedAt) : 0) - (a.uploadedAt ? new Date(a.uploadedAt) : 0));

    sorted.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'photo-card';

      const dateStr = photo.uploadedAt
        ? new Date(photo.uploadedAt).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' })
        : '';

      card.innerHTML = `
        <div class="thumb-wrap">
          <img src="${escapeHtml(photo.cloudFrontUrl || '')}"
               alt="${escapeHtml(photo.fileName || 'photo')}"
               loading="lazy">
        </div>
        <div class="info">
          <div class="name">${escapeHtml(photo.description || photo.fileName || 'Untitled')}</div>
          <div class="date">${escapeHtml(dateStr)}</div>
        </div>`;

      grid.appendChild(card);
    });
  }

  refreshBtn.addEventListener('click', loadPhotos);
  loadPhotos();
</script>
</body>
</html>
